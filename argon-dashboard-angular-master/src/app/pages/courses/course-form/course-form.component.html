<div class="header bg-gradient-primary pb-8 pt-5 pt-md-8">
  <div class="container-fluid">
    <div class="header-body">
      <h1 class="text-white">{{ courseId ? 'Edit course' : 'Create course' }}</h1>
      <p class="text-white-50 mb-0">Structure the learning experience before building chapters, lessons and quizzes.</p>
    </div>
  </div>
</div>

<div class="container-fluid mt--7">
  <div class="row justify-content-center">
    <div class="col-xl-8">
      <div class="card shadow">
        <div class="card-header">
          <h3 class="mb-0">Course details</h3>
        </div>
        <div class="card-body">
          <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
          <div class="text-center py-4" *ngIf="loading">Loading course...</div>

          <form *ngIf="!loading" (ngSubmit)="save()">
            <div class="form-group">
              <label class="form-control-label">Title</label>
              <input class="form-control" name="title" [(ngModel)]="form.title" required minlength="3">
            </div>
            <div class="form-group">
              <label class="form-control-label">Description</label>
              <textarea class="form-control" rows="5" name="description" [(ngModel)]="form.description" required minlength="10"></textarea>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label class="form-control-label">Category</label>
                  <select class="form-control" name="category" [(ngModel)]="form.category">
                    <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
                  </select>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label class="form-control-label">Stars</label>
                  <input class="form-control" name="stars" type="number" min="0" max="5" step="0.5" [(ngModel)]="form.stars">
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-control-label">Image URL</label>
              <input class="form-control" name="image" [(ngModel)]="form.image" placeholder="https://...">
            </div>
            <div class="d-flex justify-content-between">
              <a class="btn btn-neutral" routerLink="/admin/courses">Cancel</a>
              <button class="btn btn-primary" type="submit" [disabled]="saving">
                {{ saving ? 'Saving...' : 'Save and open studio' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

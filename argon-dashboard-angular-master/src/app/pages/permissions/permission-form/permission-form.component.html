<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
  <div class="container-fluid">
    <div class="header-body"></div>
  </div>
</div>

<div class="container-fluid mt--7">
  <div class="row justify-content-center">
    <div class="col-xl-8">
      <div class="card shadow">
        <div class="card-header border-0">
          <h3 class="mb-0">{{ permissionId ? 'Edit permission' : 'Create permission' }}</h3>
        </div>
        <div class="card-body">
          <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
          <div class="text-center py-4" *ngIf="loading">Loading permission...</div>

          <form [formGroup]="form" (ngSubmit)="save()" *ngIf="!loading">
            <div class="form-group">
              <label class="form-control-label">Name</label>
              <input class="form-control" formControlName="name" type="text" placeholder="MANAGE_USERS">
              <small class="text-danger" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
                Permission name is required.
              </small>
            </div>

            <div class="form-group">
              <label class="form-control-label">Description</label>
              <textarea class="form-control" formControlName="description" rows="4"></textarea>
              <small class="text-danger" *ngIf="form.get('description')?.touched && form.get('description')?.invalid">
                Description is required.
              </small>
            </div>

            <div class="d-flex justify-content-between">
              <a class="btn btn-neutral" routerLink="/permissions">Cancel</a>
              <button class="btn btn-primary" type="submit" [disabled]="saving">
                {{ saving ? 'Saving...' : 'Save permission' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

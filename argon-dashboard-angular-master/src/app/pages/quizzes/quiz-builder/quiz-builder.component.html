<div class="header bg-gradient-primary pb-8 pt-5 pt-md-8">
  <div class="container-fluid">
    <div class="header-body">
      <div class="row align-items-center">
        <div class="col-lg-8">
          <h1 class="text-white mb-1">{{ quizId ? 'Edit quiz' : 'Quiz builder' }}</h1>
          <p class="text-white-50 mb-0">Design questions manually or start from an AI-style draft.</p>
        </div>
        <div class="col-lg-4 text-lg-right mt-3 mt-lg-0">
          <button class="btn btn-white" type="button" (click)="draftAiQuiz()" *appHasPermission="['GENERATE_AI_CONTENT', 'MANAGE_USERS']">AI draft</button>
          <a class="btn btn-neutral" routerLink="/quizzes">Back</a>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid mt--7">
  <div class="row">
    <div class="col-xl-4">
      <div class="card shadow">
        <div class="card-header">
          <h3 class="mb-0">Quiz settings</h3>
        </div>
        <div class="card-body">
          <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
          <div class="text-center py-4" *ngIf="loading">Loading builder...</div>
          <form *ngIf="!loading" (ngSubmit)="save()">
            <div class="form-group">
              <label class="form-control-label">Title</label>
              <input class="form-control" name="title" [(ngModel)]="form.title" required>
            </div>
            <div class="form-group">
              <label class="form-control-label">Description</label>
              <textarea class="form-control" rows="4" name="description" [(ngModel)]="form.description"></textarea>
            </div>
            <div class="form-group">
              <label class="form-control-label">Course</label>
              <select class="form-control" name="courseId" [(ngModel)]="form.courseId" required>
                <option [ngValue]="0">Select course</option>
                <option *ngFor="let course of courses" [ngValue]="course.id">{{ course.title }}</option>
              </select>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label class="form-control-label">Passing %</label>
                  <input class="form-control" type="number" min="0" max="100" name="passingScore" [(ngModel)]="form.passingScore">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label class="form-control-label">Minutes</label>
                  <input class="form-control" type="number" min="1" name="timeLimitMinutes" [(ngModel)]="form.timeLimitMinutes">
                </div>
              </div>
            </div>
            <div class="custom-control custom-checkbox mb-4">
              <input class="custom-control-input" id="activeQuiz" type="checkbox" name="active" [(ngModel)]="form.active">
              <label class="custom-control-label" for="activeQuiz">Active quiz</label>
            </div>
            <button class="btn btn-primary btn-block" type="submit" [disabled]="saving">
              {{ saving ? 'Saving...' : 'Save quiz' }}
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-xl-8">
      <div class="card shadow">
        <div class="card-header border-0">
          <div class="row align-items-center">
            <div class="col">
              <h3 class="mb-0">Questions</h3>
            </div>
            <div class="col text-right">
              <button class="btn btn-sm btn-primary" type="button" (click)="addQuestion('SINGLE_CHOICE')">Single</button>
              <button class="btn btn-sm btn-info" type="button" (click)="addQuestion('MULTIPLE_CHOICE')">Multiple</button>
              <button class="btn btn-sm btn-danger" type="button" (click)="addQuestion('TRUE_FALSE')">True/False</button>
            </div>
          </div>
        </div>
        <div class="card-body pt-0">
          <div class="empty-builder" *ngIf="!loading && form.questions.length === 0">
            <i class="ni ni-bulb-61"></i>
            <h3>No questions yet</h3>
          </div>

          <div class="question-card" *ngFor="let question of form.questions; let qIndex = index">
            <div class="question-top">
              <span>{{ qIndex + 1 }}</span>
              <select class="form-control form-control-sm" [(ngModel)]="question.type" name="type{{ qIndex }}">
                <option value="SINGLE_CHOICE">Single choice</option>
                <option value="MULTIPLE_CHOICE">Multiple choice</option>
                <option value="TRUE_FALSE">True / False</option>
              </select>
              <input class="form-control form-control-sm points" type="number" min="1" [(ngModel)]="question.points" name="points{{ qIndex }}">
              <button class="btn btn-sm btn-outline-danger" type="button" (click)="removeQuestion(qIndex)">Remove</button>
            </div>

            <textarea class="form-control mt-3" rows="2" placeholder="Question text" [(ngModel)]="question.text" name="text{{ qIndex }}"></textarea>

            <div class="options mt-3">
              <div class="option-row" *ngFor="let option of question.options; let oIndex = index">
                <input type="checkbox" [checked]="option.correct" (change)="question.type === 'MULTIPLE_CHOICE' ? option.correct = !option.correct : markSingleCorrect(question, oIndex)">
                <input class="form-control form-control-sm" [(ngModel)]="option.text" name="option{{ qIndex }}{{ oIndex }}" placeholder="Answer option">
                <button class="btn btn-sm btn-link text-danger" type="button" (click)="removeOption(question, oIndex)" *ngIf="question.options.length > 2">Remove</button>
              </div>
              <button class="btn btn-sm btn-neutral mt-2" type="button" (click)="addOption(question)" *ngIf="question.type !== 'TRUE_FALSE'">Add option</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

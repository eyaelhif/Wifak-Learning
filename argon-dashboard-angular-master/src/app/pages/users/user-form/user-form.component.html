<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
  <div class="container-fluid">
    <div class="header-body"></div>
  </div>
</div>

<div class="container-fluid mt--7">
  <div class="row justify-content-center">
    <div class="col-xl-8">
      <div class="card shadow">
        <div class="card-header border-0">
          <h3 class="mb-0">{{ userId ? 'Edit user' : 'Create user' }}</h3>
        </div>
        <div class="card-body">
          <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
          <div class="text-center py-4" *ngIf="loading">Loading user...</div>

          <form [formGroup]="form" (ngSubmit)="save()" *ngIf="!loading">
            <div class="form-group">
              <label class="form-control-label">Full name</label>
              <input class="form-control" formControlName="fullName" type="text">
              <small class="text-danger" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.invalid">
                Full name is required.
              </small>
            </div>

            <div class="form-group">
              <label class="form-control-label">Email</label>
              <input class="form-control" formControlName="email" type="email">
              <small class="text-danger" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
                A valid email is required.
              </small>
            </div>

            <div class="form-group" *ngIf="!userId">
              <label class="form-control-label">Password</label>
              <input class="form-control" formControlName="password" type="password">
              <small class="text-danger" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
                Password must contain at least 6 characters.
              </small>
            </div>

            <div class="custom-control custom-checkbox mb-4">
              <input class="custom-control-input" id="active" type="checkbox" formControlName="active">
              <label class="custom-control-label" for="active">Active account</label>
            </div>

            <div class="d-flex justify-content-between">
              <a class="btn btn-neutral" routerLink="/users">Cancel</a>
              <button class="btn btn-primary" type="submit" [disabled]="saving">
                {{ saving ? 'Saving...' : 'Save user' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
